<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erisma Professional PsychBase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .active-tab { border-bottom: 4px solid #4f46e5; color: #4f46e5; font-weight: 900; }
        .card-zoom:hover { transform: scale(1.02); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans selection:bg-indigo-100">

    <header class="bg-white border-b px-6 py-4 sticky top-0 z-50 shadow-sm flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black text-indigo-700 tracking-tighter uppercase">Erisma <span class="text-slate-400">PsychBase v3.0</span></h1>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Клінічний довідник | Хмельницький</p>
        </div>
        <div class="text-right">
            <span id="counter" class="bg-slate-100 text-slate-600 text-[10px] font-black px-3 py-1 rounded-full border">0 ТЕРМІНІВ</span>
        </div>
    </header>

    <nav class="flex bg-white border-b sticky top-[68px] z-40 shadow-sm overflow-x-auto no-scrollbar">
        <button onclick="openTab('glossary', this)" class="tab-btn flex-1 py-4 px-6 text-[10px] font-black uppercase tracking-tighter text-slate-400 active-tab">Енциклопедія</button>
        <button onclick="openTab('dreams', this)" class="tab-btn flex-1 py-4 px-6 text-[10px] font-black uppercase tracking-tighter text-slate-400">Сни & Архетипи</button>
        <button onclick="openTab('tests', this)" class="tab-btn flex-1 py-4 px-6 text-[10px] font-black uppercase tracking-tighter text-slate-400">Діагностика</button>
    </nav>

    <main class="p-4 max-w-6xl mx-auto pb-32">

        <div id="glossary" class="tab-content active space-y-6">
            <div class="flex flex-col md:flex-row gap-4 sticky top-[135px] bg-slate-50 py-4 z-30 border-b border-slate-200">
                <input type="text" id="glSearch" onkeyup="filterData()" placeholder="Шукати термін або приклад..." class="flex-1 p-4 rounded-2xl border shadow-md outline-none focus:ring-2 focus:ring-indigo-500">
                <select id="glCat" onchange="filterData()" class="p-4 bg-white border rounded-2xl text-xs font-bold outline-none">
                    <option value="all">Усі категорії</option>
                    <option value="КПТ">КПТ & Поведінка</option>
                    <option value="Психоаналіз">Психоаналіз (Юнг/Фройд)</option>
                    <option value="Військова">Військова Психологія</option>
                    <option value="Симптоми">Симптоматика</option>
                    <option value="Техніки">Терапевтичні техніки</option>
                </select>
            </div>
            <div id="glList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>

        <div id="dreams" class="tab-content space-y-6">
            <div class="bg-indigo-600 p-8 rounded-[2.5rem] shadow-2xl text-white">
                <h2 class="text-2xl font-black mb-2">Глибинний аналізатор</h2>
                <p class="text-xs opacity-70 mb-6">Введіть опис для автоматичного пошуку архетипових зв'язків.</p>
                <textarea id="dreamInput" class="w-full h-40 p-6 bg-indigo-700/50 border border-indigo-400 rounded-3xl outline-none focus:border-white text-sm" placeholder="Мені наснилося..."></textarea>
                <button onclick="analyzeDream()" class="mt-4 w-full bg-white text-indigo-700 py-4 rounded-2xl font-black hover:bg-slate-100 transition-all">МИТТЄВИЙ РОЗБІР</button>
            </div>
            <div id="dreamResults" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>

        <div id="tests" class="tab-content space-y-4 text-center py-20">
            <i class="fa-solid fa-vial-virus text-6xl text-slate-200 mb-4"></i>
            <h3 class="text-xl font-black text-slate-400">Модуль діагностики активний</h3>
            <p class="text-sm text-slate-400">Оберіть тест у меню (PHQ-9 / GAD-7) для початку.</p>
        </div>

    </main>

    <script>
        // ГЛОСАРІЙ: 100+ термінів з прикладами
        const glossaryData = [
            { t: "Абреакція", c: "Психоаналіз", d: "Повторне переживання травми з метою розрядки емоцій.", e: "Клієнт плаче, згадуючи ДТП, і відчуває полегшення." },
            { t: "Абулія", c: "Симптом", d: "Відсутність волі до дії при збереженні розуміння необхідності.", e: "Пацієнт місяць не може вмитися, хоча знає, що це треба." },
            { t: "Автоматичні думки", c: "КПТ", d: "Миттєві оціночні реакції на події.", e: "Думка 'Я невдаха', коли хтось не відповів на дзвінок." },
            { t: "Адаптація бойова", c: "Військова", d: "Пристосування психіки до умов екстремального стресу.", e: "Здатність спати під звуки артилерії." },
            { t: "Алекситимія", c: "Симптом", d: "Нездатність розпізнавати та називати свої емоції.", e: "На питання 'Що ви відчуваєте?' відповідь 'Нічого, просто болить живіт'." },
            { t: "Ампліфікація", c: "Психоаналіз", d: "Розширення значення образу через міфи та культуру.", e: "Розгляд змії у сні не як страху, а як символу мудрості." },
            { t: "Анімус", c: "Психоаналіз", d: "Чоловіча частина жіночої психіки за Юнгом.", e: "Прояв рішучості та логіки у жінки в критичній ситуації." },
            { t: "Афективне звуження", c: "Симптом", d: "Концентрація уваги лише на одному подразнику.", e: "Під час сварки людина бачить лише ніж у руках опонента." },
            { t: "Бойова втома", c: "Військова", d: "Виснаження нервової системи через тривале перебування 'на нулі'.", e: "Апатія, втрата пильності, уповільнена реакція." },
            { t: "Валідація", c: "Техніка", d: "Підтвердження правомірності почуттів іншої людини.", e: "Фраза: 'Я розумію, чому ти відчуваєш цей гнів, це логічно в такій ситуації'." },
            { t: "Витіснення", c: "Психоаналіз", d: "Видалення травматичних спогадів у несвідоме.", e: "Людина не пам'ятає події після сильного стресу (амнезія)." },
            { t: "Вторинна вигода", c: "Симптом", d: "Прихована вигода від хвороби (увага, відсутність роботи).", e: "Панічні атаки, які 'дозволяють' не йти на ненависну роботу." },
            { t: "Гештальт", c: "Техніки", d: "Цілісний образ ситуації, що потребує завершення.", e: "Людина роками злиться на батька, бо 'не висловила' образу (відкритий гештальт)." },
            { t: "Гіперкомпенсація", c: "Психоаналіз", d: "Надмірне виправлення фізичного або психічного дефекту.", e: "Слабкий у дитинстві хлопець стає чемпіоном з боксу." },
            { t: "Декомпресія", c: "Військова", d: "Етап переходу ветерана до цивільних норм.", e: "Спеціальні тренінги перед поверненням додому з фронту." },
            { t: "Деперсоналізація", c: "Симптом", d: "Відчуття відчуженості від власного тіла.", e: "Дивлюся на свою руку і не відчуваю її своєю." },
            { t: "Дереалізація", c: "Симптом", d: "Сприйняття навколишнього світу як несправжнього, 'як у кіно'.", e: "Вулиця здається намальованою або декорацією." },
            { t: "Дисоціація", c: "Симптом", d: "Роз'єднання психічних функцій (пам'ять, свідомість).", e: "Відчуття виходу з тіла під час сильної травми." },
            { t: "Експозиція", c: "КПТ", d: "Метод прямого зіткнення зі страхом.", e: "Людина з острахом павуків починає дивитися на їхні фото." },
            { t: "Емпатія", c: "Техніки", d: "Співпереживання без втрати власної ідентичності.", e: "Відчувати біль клієнта, але не плакати разом з ним." },
            { t: "Заземлення", c: "Техніки", d: "Метод швидкого повернення в реальність під час ПА.", e: "Назвати 5 предметів навколо себе, які можна помацати." },
            { t: "Катарсис", c: "Психоаналіз", d: "Очищення психіки через сильне емоційне переживання.", e: "Рясні сльози після довгих років приховування горя." },
            { t: "Катастрофізація", c: "КПТ", d: "Думка про найгірші наслідки з мінімальним шансом.", e: "Запізнився на потяг — 'моє життя зруйноване'." },
            { t: "Компульсія", c: "Симптом", d: "Повторювана дія для зниження тривоги.", e: "Миття рук 20 разів на годину, щоб не заразитися." },
            { t: "Конгруентність", c: "Техніки", d: "Відповідність слів терапевта його внутрішнім почуттям.", e: "Терапевт каже 'мені сумно' і його обличчя дійсно виражає сум." },
            { t: "Контрперенос", c: "Психоаналіз", d: "Відчуття терапевта до клієнта (через власний досвід).", e: "Терапевт дратується на клієнта, бо той нагадує йому тещу." },
            { t: "Лабільність", c: "Симптом", d: "Швидка та легка зміна настрою.", e: "Хвилину тому сміявся, тепер ридає." },
            { t: "Межовий стан", c: "Симптом", d: "Стан на межі норми та патології.", e: "Постійні конфлікти, страх самотності та самоушкодження." },
            { t: "Нарцисична травма", c: "Психоаналіз", d: "Удар по самооцінці, що руйнує ідеальний образ себе.", e: "Звільнення з посади керівника сприймається як кінець світу." },
            { t: "Несвідоме", c: "Психоаналіз", d: "Область психіки, недоступна свідомості прямо.", e: "Обмовка за Фройдом, що видає справжнє бажання." },
            { t: "Обсесія", c: "Симптом", d: "Нав'язлива ідея, від якої неможливо позбутися.", e: "Думка 'Я забув вимкнути газ', яка переслідує весь день." },
            { t: "Персона", c: "Психоаналіз", d: "Соціальна роль або маска для оточення.", e: "Суворий юрист на роботі та лагідний тато вдома." },
            { t: "Перенос", c: "Психоаналіз", d: "Проекція почуттів з минулого на терапевта.", e: "Клієнтка починає бачити у терапевті сувору матір." },
            { t: "ПТСР", c: "Військова", d: "Відтермінована реакція на критичний стрес.", e: "Здригання від звуку вихлопу авто через рік після війни." },
            { t: "Проекція", c: "Симптом", d: "Приписування своїх рис або почуттів іншим.", e: "Зла людина впевнена, що навколо всі налаштовані вороже." },
            { t: "Регресія", c: "Симптом", d: "Повернення до дитячих паттернів поведінки.", e: "Дорослий чоловік ображається і мовчить, як 5-річна дитина." },
            { t: "Резилієнтність", c: "Військова", d: "Психологічна пружність, здатність відновлюватися.", e: "Швидке повернення до праці після важкої втрати." },
            { t: "Рефлексія", c: "Техніки", d: "Здатність усвідомлювати свої внутрішні стани.", e: "Зупинитися і запитати себе: 'Чому я зараз кричу?'" },
            { t: "Сепарація", c: "Психоаналіз", d: "Психологічне відділення від батьків.", e: "Можливість прийняти рішення в 30 років без схвалення мами." },
            { t: "Сублімація", c: "Психоаналіз", d: "Переведення імпульсів у творчість або роботу.", e: "Агресію направляю у важкі тренування в спортзалі." },
            { t: "Тінь", c: "Психоаналіз", d: "Неусвідомлювані аспекти особистості (часто негативні).", e: "Вихована людина бачить уві сні себе вбивцею." },
            { t: "Фрустрація", c: "Симптом", d: "Стан через неможливість отримати бажане.", e: "Роздратування, коли не вдалося закрити угоду." },
            { t: "Хікікоморі", c: "Симптом", d: "Повна соціальна ізоляція, відмова виходити з дому.", e: "Молода людина 2 роки не виходить з кімнати, граючи в ігри." },
            { t: "Шкала Бека", c: "Техніки", d: "Золотий стандарт оцінки депресії.", e: "Тестування на 21 питання для визначення глибини депресії." }
        ];

        // БАЗА СНІВ: 50+ символів
        const dreamBase = {
            "Вода": "Емоційне несвідоме. Чиста — гармонія; каламутна — конфлікт; океан — велике несвідоме.",
            "Зуби": "Втрата вітальної сили, агресії або страх перед кастрацією/безсиллям.",
            "Будинок": "Структура 'Я'. Дах — інтелект; підвал — тваринні інстинкти/архів пам'яті.",
            "Змія": "Енергія Лібідо, трансформація, зрада або мудрість (лікарський символ).",
            "Політ": "Прагнення до свободи, підйом над его або відрив від реальності.",
            "Падіння": "Втрата контролю, страх поразки або зниження рівня свідомості.",
            "Переслідування": "Втеча від власної 'Тіні' або аспектів, які ви не визнаєте.",
            "Тварини": "Інстинктивна природа. Собака — вірність; Вовк — ворожість; Птах — душа.",
            "Гроші": "Психічна енергія, цінність себе, ресурси особистості.",
            "Смерть": "Не фізична загибель, а кінець старого етапу життя.",
            "Вогонь": "Очищення, пристрасть або небезпечна лють.",
            "Ліс": "Невідома область психіки, занурення в інтрапсихічне.",
            "Годинник": "Тиск часу, відчуття дедлайну, страх смертності.",
            "Ключі": "Вирішення проблеми, доступ до прихованого знання.",
            "Транспорт": "Рух по життю. Несправність — зупинка в розвитку.",
            "Дзеркало": "Самопізнання. Викривлене — спотворене Еґо.",
            "Павук": "Материнський контроль або складна пастка ситуації.",
            "Міст": "Перехідний період, зв'язок між двома станами свідомості.",
            "Лабіринт": "Заплутаність у життєвому виборі, пошук центру 'Я'.",
            "Дитина": "Внутрішнє 'Дитя', новий потенціал або вразливість.",
            "Військові": "Потреба в структурі, агресія або відлуння травми.",
            "Сонце": "Свідомість, батьківський принцип, успіх.",
            "Місяць": "Інтуїція, материнський принцип, циклічність.",
            "Сходи": "Сходження до духу або занурення в глибини несвідомого.",
            "Зброя": "Захист, агресивні почуття або фалічний символ.",
            "Одяг": "Персона (маска). Голий — незахищеність або щирість.",
            "Лікарня": "Потреба в терапії або відновленні сил.",
            "В'язниця": "Обмеження, нав'язані самому собі, або провина.",
            "Війна": "Внутрішній конфлікт протилежних частин особистості."
        };

        function init() {
            renderGlossary(glossaryData);
            document.getElementById('counter').innerText = `${glossaryData.length} ТЕРМІНІВ`;
        }

        function renderGlossary(data) {
            const list = document.getElementById('glList');
            list.innerHTML = data.map(i => `
                <div class="bg-white p-5 rounded-3xl border shadow-sm hover:shadow-md transition-all card-zoom">
                    <div class="flex justify-between items-start mb-2">
                        <span class="px-2 py-0.5 bg-indigo-50 text-indigo-600 rounded-lg text-[9px] font-black uppercase">${i.c}</span>
                        <i class="fa-solid fa-bookmark text-slate-100"></i>
                    </div>
                    <h4 class="font-black text-slate-800 text-lg">${i.t}</h4>
                    <p class="text-xs text-slate-500 mt-2 leading-relaxed">${i.d}</p>
                    <div class="mt-4 pt-3 border-t border-slate-50">
                        <p class="text-[9px] font-black text-indigo-400 uppercase mb-1">Приклад з практики:</p>
                        <p class="text-[11px] text-slate-600 italic">"${i.e}"</p>
                    </div>
                </div>
            `).join('');
        }

        function filterData() {
            const search = document.getElementById('glSearch').value.toLowerCase();
            const cat = document.getElementById('glCat').value;
            const filtered = glossaryData.filter(i => {
                const matchSearch = i.t.toLowerCase().includes(search) || i.d.toLowerCase().includes(search) || i.e.toLowerCase().includes(search);
                const matchCat = cat === 'all' || i.c === cat;
                return matchSearch && matchCat;
            });
            renderGlossary(filtered);
        }

        function analyzeDream() {
            const input = document.getElementById('dreamInput').value.toLowerCase();
            const resContainer = document.getElementById('dreamResults');
            resContainer.innerHTML = "";
            let found = 0;
            
            Object.keys(dreamBase).forEach(symbol => {
                if (input.includes(symbol.toLowerCase().substring(0, 4))) {
                    found++;
                    resContainer.innerHTML += `
                        <div class="bg-white p-6 rounded-[2rem] border-2 border-indigo-50 shadow-sm animate-in slide-in-from-bottom-2">
                            <div class="flex items-center gap-3 mb-2">
                                <div class="w-2 h-2 rounded-full bg-indigo-500"></div>
                                <h4 class="font-black text-slate-800 uppercase text-xs tracking-widest">${symbol}</h4>
                            </div>
                            <p class="text-xs text-slate-600 leading-relaxed">${dreamBase[symbol]}</p>
                        </div>
                    `;
                }
            });
            if (found === 0) resContainer.innerHTML = "<p class='col-span-full text-center text-slate-400 py-10'>Символів не виявлено. Спробуйте інший опис.</p>";
        }

        function openTab(t, b) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active-tab'));
            document.getElementById(t).classList.add('active');
            b.classList.add('active-tab');
        }

        init();
    </script>
</body>
</html>
