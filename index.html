<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PsychTools Encyclopedic | Erisma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .active-tab { border-bottom: 4px solid #4f46e5; color: #4f46e5; font-weight: 900; }
        .glossary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
        @media (max-width: 640px) { .glossary-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased">

    <header class="bg-white border-b px-6 py-5 flex justify-between items-center sticky top-0 z-50 shadow-sm">
        <div>
            <h1 class="text-2xl font-black text-indigo-700 tracking-tighter">PsychTools <span class="text-slate-400">Encyclopedic</span></h1>
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Erisma Medical Centre | Khmelnytskyi</p>
        </div>
        <div class="hidden md:block text-right">
            <p id="stats" class="text-[9px] font-bold text-slate-400"></p>
        </div>
    </header>

    <nav class="flex bg-white border-b sticky top-[77px] z-40 shadow-sm overflow-x-auto">
        <button onclick="openTab('tests', this)" class="tab-btn flex-1 py-4 px-6 text-xs font-black uppercase tracking-widest text-slate-400 active-tab">Діагностика</button>
        <button onclick="openTab('dreams', this)" class="tab-btn flex-1 py-4 px-6 text-xs font-black uppercase tracking-widest text-slate-400">Архетипи_Снів</button>
        <button onclick="openTab('glossary', this)" class="tab-btn flex-1 py-4 px-6 text-xs font-black uppercase tracking-widest text-slate-400 text-indigo-600">Енциклопедія</button>
    </nav>

    <main class="p-4 max-w-5xl mx-auto pb-32">

        <div id="tests" class="tab-content space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div onclick="startTest('PHQ9')" class="bg-white p-6 rounded-3xl border shadow-sm hover:border-indigo-500 cursor-pointer transition-all">
                    <h3 class="font-black text-xl mb-1 text-slate-800">PHQ-9</h3>
                    <p class="text-xs text-slate-500">Повний клінічний опитувальник депресії</p>
                </div>
                <div onclick="startTest('GAD7')" class="bg-white p-6 rounded-3xl border shadow-sm hover:border-indigo-500 cursor-pointer transition-all">
                    <h3 class="font-black text-xl mb-1 text-slate-800">GAD-7</h3>
                    <p class="text-xs text-slate-500">Шкала генералізованої тривоги</p>
                </div>
            </div>

            <div id="test-window" class="hidden bg-white p-8 rounded-[2rem] border-2 border-indigo-100 shadow-2xl">
                <div id="questions-container" class="space-y-6"></div>
                <button onclick="finishTest()" class="mt-8 w-full bg-indigo-600 text-white py-5 rounded-2xl font-black text-lg">АНАЛІЗУВАТИ</button>
            </div>

            <div id="test-result" class="hidden bg-slate-900 text-white p-10 rounded-[3rem] shadow-2xl text-center">
                <h2 id="score-display" class="text-8xl font-black text-indigo-400 mb-2">0</h2>
                <h3 id="interp-label" class="text-2xl font-bold mb-4"></h3>
                <p id="interp-details" class="text-slate-400 italic max-w-md mx-auto"></p>
                <button onclick="cancelTest()" class="mt-8 px-8 py-3 bg-slate-800 rounded-xl text-xs font-bold uppercase tracking-widest">Назад</button>
            </div>
        </div>

        <div id="dreams" class="tab-content space-y-6">
            <div class="bg-indigo-900 text-white p-8 rounded-[2.5rem] shadow-xl">
                <h2 class="text-2xl font-black mb-4">Аналізатор сновидінь</h2>
                <textarea id="dreamInput" class="w-full h-40 p-5 bg-indigo-800/50 border border-indigo-700 rounded-2xl outline-none focus:border-white text-sm placeholder-indigo-300" placeholder="Введіть опис сну..."></textarea>
                <button onclick="analyzeDream()" class="mt-4 w-full bg-white text-indigo-900 py-4 rounded-xl font-black hover:bg-indigo-50 transition-colors">ЗНАЙТИ СИМВОЛИ</button>
            </div>

            <div id="dream-results" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                </div>
        </div>

        <div id="glossary" class="tab-content active space-y-6">
            <div class="flex flex-col md:flex-row gap-4 sticky top-[140px] bg-slate-50 py-4 z-30">
                <input type="text" id="glSearch" onkeyup="filterGlossary()" placeholder="Шукати серед сотень термінів..." class="flex-1 p-5 rounded-2xl border-2 border-indigo-100 outline-none focus:border-indigo-500 shadow-md">
                <div class="flex gap-2 overflow-x-auto pb-2">
                    <button onclick="filterCat('all')" class="px-4 py-2 bg-indigo-600 text-white rounded-xl text-xs font-bold">Всі</button>
                    <button onclick="filterCat('КПТ')" class="px-4 py-2 bg-white border rounded-xl text-xs font-bold">КПТ</button>
                    <button onclick="filterCat('Юнг')" class="px-4 py-2 bg-white border rounded-xl text-xs font-bold">Юнг</button>
                    <button onclick="filterCat('Військова')" class="px-4 py-2 bg-white border rounded-xl text-xs font-bold">Військова</button>
                </div>
            </div>
            <div id="glList" class="glossary-grid"></div>
        </div>

    </main>

    <script>
        // БАЗА ДАНИХ ТЕРМІНІВ (СКОРОЧЕНО ДЛЯ ПРИКЛАДУ, АЛЕ В КОДІ МОЖЕ БУТИ 100+)
        const glossaryData = [
            { t: "Абстиненція", c: "Психіатрія", d: "Стан після припинення вживання психоактивних речовин." },
            { t: "Абулія", c: "Симптом", d: "Повна відсутність спонукань до діяльності, безвольність." },
            { t: "Автаркія", c: "Філософія", d: "Здатність особистості до самоврядування та незалежності." },
            { t: "Агріпнія", c: "Симптом", d: "Порушення сну, повне безсоння." },
            { t: "Адаптивний потенціал", c: "Військова", d: "Здатність військовослужбовця витримувати бойові стреси." },
            { t: "Афект", c: "Стан", d: "Сильне, короткочасне емоційне переживання." },
            { t: "Бойова психічна травма", c: "Військова", d: "Психогенний розлад внаслідок дії факторів бою." },
            { t: "Військова декомпресія", c: "Військова", d: "Процес поступового переходу від війни до мирного життя." },
            { t: "Гіперпильність", c: "ПТСР", d: "Постійне очікування небезпеки, характерне для ветеранів." },
            { t: "Деперсоналізація", c: "Розлад", d: "Відчуття втрати власного 'Я', спостереження за собою збоку." },
            { t: "Екзистенційна криза", c: "Теорія", d: "Втрата сенсу життя, відчуття порожнечі." },
            { t: "Зворотний зв'язок", c: "Техніка", d: "Повідомлення клієнту про те, як його поведінка сприймається оточенням." },
            { t: "Ідентичність", c: "Психологія", d: "Усвідомлення людиною своєї приналежності до певної групи." },
            { t: "Катастрофізація", c: "КПТ", d: "Схильність уявляти найгірший варіант розвитку подій." },
            { t: "Когнітивний дисонанс", c: "Теорія", d: "Стан дискомфорту через суперечність між знаннями та діями." },
            { t: "Лабільність емоційна", c: "Симптом", d: "Швидка та необґрунтована зміна настрою." },
            { t: "Менталізація", c: "Навичка", d: "Здатність розуміти психічний стан — свій та інших." },
            { t: "Негативізм", c: "Поведінка", d: "Безпідставний опір будь-яким зовнішнім впливам." },
            { t: "Обсесія", c: "Симптом", d: "Нав'язлива думка, яка виникає проти волі людини." },
            { t: "Параноїдний стан", c: "Психіатрія", d: "Система марення, часто пов'язана з переслідуванням." },
            { t: "Резилієнтність", c: "Стан", d: "Психологічна пружність, здатність відновлюватися після травм." },
            { t: "Трансгресія", c: "Філософія", d: "Перехід за межі звичних норм та досвіду." },
            { t: "Флешбек", c: "ПТСР", d: "Раптове, яскраве повторне переживання травматичної події." }
            // Можна додати ще 80+ термінів за такою ж логікою
        ];

        const dreamSymbols = {
            "Вода": "Емоції. Океан — несвідоме; калюжа — дрібна проблема; цунамі — емоційний шторм.",
            "Зброя": "Агресія, захист або відчуття загрози. Стріляти — вивільнення гніву.",
            "Будинок": "Структура 'Я'. Дах — інтелект; вікна — погляд на світ; замки — закритість.",
            "Тварини": "Інстинкти. Вовк — самотність/агресія; птах — прагнення свободи; павук — контроль.",
            "Транспорт": "Життєвий шлях. Потяг — зумовленість; авто — контроль; аварія — криза.",
            "Військові": "Потреба у дисципліні, внутрішній конфлікт або відлуння реального досвіду.",
            "Лікарня": "Потреба у зціленні, оновленні або страх хвороби.",
            "Світло": "Усвідомлення, нова ідея, духовний провідник.",
            "Темрява": "Невідомість, страх перед Тінню, приховані аспекти ситуації.",
            "Гроші": "Енергія, ресурси, самооцінка. Втрата — страх безсилля.",
            "Ключі": "Рішення, доступ до нових знань, відкриття таємниць.",
            "Годинник": "Тиск часу, дедлайни, усвідомлення смертності.",
            "Сходи": "Соціальний ріст або занурення в себе. Спуск — шлях у несвідоме.",
            "Дзеркало": "Самопізнання. Розбите — криза ідентичності."
        };

        // Функція ініціалізації
        function init() {
            renderGlossary(glossaryData);
            document.getElementById('stats').innerText = `${glossaryData.length} термінів | ${Object.keys(dreamSymbols).length} символів`;
        }

        function renderGlossary(data) {
            const list = document.getElementById('glList');
            list.innerHTML = data.map(i => `
                <div class="gl-item bg-white p-5 rounded-2xl border shadow-sm hover:shadow-md transition-all">
                    <span class="px-2 py-0.5 bg-indigo-50 text-indigo-600 rounded text-[9px] font-black uppercase">${i.c}</span>
                    <h4 class="font-black text-slate-800 text-lg mt-1">${i.t}</h4>
                    <p class="text-xs text-slate-500 mt-2 leading-relaxed">${i.d}</p>
                </div>
            `).join('');
        }

        function filterGlossary() {
            const search = document.getElementById('glSearch').value.toLowerCase();
            const filtered = glossaryData.filter(i => 
                i.t.toLowerCase().includes(search) || 
                i.d.toLowerCase().includes(search)
            );
            renderGlossary(filtered);
        }

        function analyzeDream() {
            const input = document.getElementById('dreamInput').value.toLowerCase();
            const container = document.getElementById('dream-results');
            container.innerHTML = "";
            
            let count = 0;
            Object.keys(dreamSymbols).forEach(s => {
                if (input.includes(s.toLowerCase().substring(0, 4))) {
                    count++;
                    container.innerHTML += `
                        <div class="bg-white p-6 rounded-3xl border-2 border-indigo-50 shadow-sm animate-in slide-in-from-bottom-2">
                            <h4 class="font-black text-indigo-600 uppercase text-xs mb-2 tracking-widest">${s}</h4>
                            <p class="text-sm text-slate-700">${dreamSymbols[s]}</p>
                        </div>
                    `;
                }
            });
            if(count === 0) container.innerHTML = "<p class='col-span-full text-center text-slate-400 py-10'>Символів не знайдено. Спробуйте ширший опис.</p>";
        }

        // Логіка перемикання вкладок
        function openTab(t, b) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active-tab', 'text-indigo-600'));
            document.getElementById(t).classList.add('active');
            b.classList.add('active-tab', 'text-indigo-600');
        }

        // ТЕСТИ
        const questions = ["Ніколи", "Кілька днів", "Більше тижня", "Майже щодня"];
        let testType = "";
        let scores = [];

        function startTest(type) {
            testType = type;
            document.getElementById('tests').firstElementChild.classList.add('hidden');
            document.getElementById('test-window').classList.remove('hidden');
            const cont = document.getElementById('questions-container');
            const qs = type === 'PHQ9' ? ["Інтерес?", "Настрій?", "Сон?", "Енергія?", "Апетит?", "Про себе?", "Концентрація?", "Рухи?", "Думки?"] : ["Нервозність?", "Контроль?", "Хвилювання?", "Розслаблення?", "Неспокій?", "Роздратування?", "Страх?"];
            cont.innerHTML = qs.map((q, i) => `
                <div class="space-y-3">
                    <p class="font-bold text-slate-800">${i+1}. ${q}</p>
                    <div class="grid grid-cols-4 gap-2">
                        ${questions.map((v, idx) => `<button onclick="scores[${i}]=${idx}; this.parentElement.querySelectorAll('button').forEach(b=>b.classList.replace('bg-indigo-600','bg-slate-100')); this.classList.replace('bg-slate-100','bg-indigo-600');" class="py-2 text-[8px] font-bold uppercase rounded-xl bg-slate-100">${v}</button>`).join('')}
                    </div>
                </div>
            `).join('');
            scores = new Array(qs.length).fill(null);
        }

        function finishTest() {
            if(scores.includes(null)) return alert("Відповіді?");
            const total = scores.reduce((a, b) => a + b, 0);
            document.getElementById('test-window').classList.add('hidden');
            document.getElementById('test-result').classList.remove('hidden');
            document.getElementById('score-display').innerText = total;
            document.getElementById('interp-label').innerText = total > 10 ? "Клінічний рівень" : "Межі норми";
            document.getElementById('interp-details').innerText = "Для точного діагнозу зверніться до спеціаліста Erisma Medical Centre.";
        }

        function cancelTest() {
            location.reload(); // Найпростіший скидання
        }

        init();
    </script>
</body>
</html>
