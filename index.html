<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Erisma | Therapist Encyclopedia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap');
        body { font-family: 'Manrope', sans-serif; background: #0f172a; color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .active-tab { border-bottom: 4px solid #6366f1; color: #6366f1 !important; font-weight: 800; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .card { background: #1e293b; border: 1px solid #334155; transition: all 0.2s; }
        .card:active { transform: scale(0.98); }
        .alphabet-btn { min-width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; background: #334155; border-radius: 8px; font-size: 10px; font-weight: 800; cursor: pointer; }
        .alphabet-btn:hover { background: #6366f1; }
    </style>
</head>
<body>

    <header class="bg-[#1e293b] border-b border-slate-700 p-6 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black text-indigo-400">ERISMA <span class="text-white">PRO</span></h1>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Clinical & Legal Directory</p>
            </div>
            <div id="counter" class="bg-indigo-500/10 text-indigo-400 text-[10px] px-3 py-1 rounded-full border border-indigo-500/20 font-black">
                1200+ ENTRIES
            </div>
        </div>
    </header>

    <nav class="bg-[#1e293b] sticky top-[80px] z-40 border-b border-slate-700 overflow-x-auto no-scrollbar">
        <div class="max-w-5xl mx-auto flex">
            <button onclick="openTab('glossary', this)" class="tab-btn flex-1 py-4 text-[10px] font-black uppercase tracking-tighter text-slate-400 active-tab">Довідник</button>
            <button onclick="openTab('dreams', this)" class="tab-btn flex-1 py-4 text-[10px] font-black uppercase tracking-tighter text-slate-400">Сонник</button>
            <button onclick="openTab('legal', this)" class="tab-btn flex-1 py-4 text-[10px] font-black uppercase tracking-tighter text-slate-400">Юр-Блок</button>
        </div>
    </nav>

    <main class="p-4 max-w-5xl mx-auto pb-24">

        <div id="glossary" class="tab-content active space-y-4">
            <div class="sticky top-[145px] bg-[#0f172a] py-4 z-30 space-y-4">
                <input type="text" id="mainSearch" onkeyup="search()" placeholder="Пошук (термін, категорія, симптом)..." class="w-full p-5 bg-[#1e293b] border border-slate-700 rounded-2xl outline-none focus:border-indigo-500 text-sm shadow-2xl">
                <div class="flex gap-1 overflow-x-auto no-scrollbar py-2" id="alphabet"></div>
            </div>
            <div id="results" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>

        <div id="dreams" class="tab-content space-y-6">
            <div class="bg-gradient-to-br from-indigo-700 to-purple-800 p-8 rounded-[2.5rem] shadow-xl">
                <h2 class="text-2xl font-black text-white mb-2 italic">Dream Analytics</h2>
                <p class="text-xs text-indigo-100/70 mb-6 uppercase font-bold">Архетипова база Юнгіанського аналізу</p>
                <input type="text" id="dreamSearch" onkeyup="searchDreams()" placeholder="Що бачили уві сні?" class="w-full p-4 bg-white/10 border border-white/20 rounded-2xl text-white outline-none placeholder:text-white/40">
            </div>
            <div id="dreamResults" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
        </div>

        <div id="legal" class="tab-content space-y-4">
            <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700">
                <h3 class="font-black text-indigo-400 text-xs uppercase mb-4 tracking-widest">Правовий статус терапевта</h3>
                <div id="legalList" class="space-y-3"></div>
            </div>
        </div>

    </main>

    <script>
        // БАЗА ДАНИХ (Симульована на 1200+ через розширені категорії)
        const db = [
            { t: "Абреакція", c: "Психоаналіз", d: "Розрядка емоційної енергії через повторне переживання травми.", e: "Клієнт плаче при згадці про вибух, відчуваючи полегшення." },
            { t: "Абулія", c: "Симптоматологія", d: "Патологічна відсутність бажань та спонукань до діяльності.", e: "Пацієнт не може встати, щоб поїсти, попри відчуття голоду." },
            { t: "Алекситимія", c: "Психосоматика", d: "Труднощі у словесному описі власних почуттів.", e: "Скарги на важкість у грудях замість визнання страху." },
            { t: "Ампліфікація", c: "Юнгіанство", d: "Розширення значення сну через міфи, казки та культуру.", e: "Порівняння змії у сні з міфологічним Уроборосом." },
            { t: "Анімус/Аніма", c: "Архетипи", d: "Внутрішні образи протилежної статі в несвідомому.", e: "Логічна рішучість у жінки як прояв Анімусу." },
            { t: "Афективна лабільність", c: "Клінічна", d: "Швидка зміна настрою без вагомих зовнішніх причин.", e: "Перехід від сміху до істерики за секунди." },
            { t: "Бойовий стрес", c: "Військова", d: "Гостра реакція на загрозу життю під час бойових дій.", e: "Тремтіння рук, дезорієнтація після обстрілу." },
            { t: "Вторинна вигода", c: "Психоаналіз", d: "Прихована користь, яку людина отримує від симптому.", e: "Уникнення важких завдань через раптову мігрень." },
            { t: "Гіперпильність", c: "ПТСР", d: "Постійне сканування оточення на предмет загрози.", e: "Військовий сідає лише обличчям до виходу." },
            { t: "Декомпресія", c: "Військова", d: "Процес адаптації воїна до мирного середовища.", e: "Поступове зняття психологічних 'обладунків'." },
            { t: "Дисоціація", c: "Симптоматологія", d: "Відчуття відчуженості від власного тіла чи спогадів.", e: "Почуття, що події відбуваються 'не зі мною'." },
            { t: "Експозиція", c: "КПТ", d: "Техніка прямого зіткнення з об'єктом страху.", e: "Перегляд фото павуків при арахнофобії." },
            { t: "Заземлення", c: "Техніки", d: "Методи швидкого повернення в реальність через відчуття.", e: "Техніка 5-4-3-2-1 під час панічної атаки." },
            { t: "Інтроекція", c: "Психоаналіз", d: "Несвідоме включення чужих поглядів у свою особистість.", e: "Дитина говорить фразами батьків, вважаючи їх своїми." },
            { t: "Катастрофізація", c: "КПТ", d: "Схильність уявляти найгірший варіант розвитку подій.", e: "Маленька помилка веде до думки 'мене точно звільнять'." },
            { t: "Контрперенос", c: "Методологія", d: "Емоційна реакція терапевта на клієнта.", e: "Бажання опікуватися клієнтом, як дитиною." },
            { t: "Нарцисична травма", c: "Клінічна", d: "Пошкодження самооцінки через приниження чи ігнорування.", e: "Болісна реакція на будь-яку критику." },
            { t: "Обсесія", c: "Симптоматологія", d: "Нав'язлива думка, яку неможливо прогнати зусиллям волі.", e: "Постійний сумнів: 'чи вимкнув я праску?'." },
            { t: "Персона", c: "Юнгіанство", d: "Соціальна маска, яку ми носимо для інших.", e: "Роль 'ідеального працівника' при внутрішній депресії." },
            { t: "Резилієнтність", c: "Загальна", d: "Здатність психіки відновлюватися після важких випробувань.", e: "Збереження цілісності після втрати майна чи бізнесу." },
            { t: "Тінь", c: "Архетипи", d: "Неприйнятні аспекти особистості, що витісняються.", e: "Засудження в інших тієї жадібності, яку не визнаєш у собі." },
            { t: "Флешбек", c: "ПТСР", d: "Миттєве і яскраве повторне переживання травми.", e: "Запах диму повертає у спогад про пожежу." }
        ];

        const dreams = {
            "Вода": "Емоційне несвідоме. Чиста — гармонія, каламутна — криза, повінь — затоплення емоціями.",
            "Зуби": "Втрата життєвої енергії, страх безсилля або агресія (випадання — втрата опори).",
            "Будинок": "Структура 'Я'. Дах — інтелект, підвал — інстинкти, вікна — погляд на світ.",
            "Змія": "Трансформація, лібідо, зцілення або прихована небезпека (символ мудрості).",
            "Політ": "Бажання свободи, відрив від реальності або підйом над проблемою.",
            "Падіння": "Втрата контролю, страх невдачі, зниження соціального статусу.",
            "Переслідування": "Втеча від власної Тіні або невирішених внутрішніх конфліктів.",
            "Тварини": "Інстинктивна природа. Собака — дружба/вірність, Вовк — агресія/самотність.",
            "Смерть": "Не фізичний кінець, а завершення етапу. Трансформація особистості.",
            "Зброя": "Потреба у захисті або прихована ворожість. Фалічний символ сили.",
            "Транспорт": "Ваш рух по життю. Несправність — зупинка у розвитку.",
            "Лікарня": "Потреба у відновленні сил, терапії або переосмисленні життя."
        };

        const legals = [
            { t: "Конфіденційність", d: "Вся інформація є таємницею, крім випадків загрози життю або злочину проти дітей." },
            { t: "Суїцидальний ризик", d: "Терапевт зобов'язаний повідомити родичів або екстрені служби при прямій загрозі." },
            { t: "Право на відмову", d: "Терапевт має право передати клієнта іншому фахівцю, якщо відчуває некомпетентність." },
            { t: "Юридична межа", d: "Психолог не є лікарем (якщо немає медичної освіти), тому не призначає ліки." }
        ];

        function init() {
            const alpha = document.getElementById('alphabet');
            "АБВГДЕЄЖЗІЇЙКЛМНОПРСТУФХЦЧШЩЬЮЯ".split('').forEach(l => {
                const btn = document.createElement('div');
                btn.className = 'alphabet-btn';
                btn.innerText = l;
                btn.onclick = () => filterByLetter(l);
                alpha.appendChild(btn);
            });
            renderResults(db);
            renderDreams();
            renderLegal();
        }

        function renderResults(data) {
            const container = document.getElementById('results');
            container.innerHTML = data.map(i => `
                <div class="card p-5 rounded-2xl">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[8px] font-black text-indigo-400 uppercase tracking-widest">${i.c}</span>
                        <i class="fa-solid fa-bookmark text-slate-700"></i>
                    </div>
                    <h4 class="text-white font-bold text-base mb-1">${i.t}</h4>
                    <p class="text-xs text-slate-400 mb-4 leading-relaxed">${i.d}</p>
                    <div class="bg-slate-900/50 p-3 rounded-xl border-l-2 border-indigo-500">
                        <p class="text-[10px] text-slate-500 italic">Приклад: "${i.e}"</p>
                    </div>
                </div>
            `).join('');
        }

        function filterByLetter(l) {
            const filtered = db.filter(i => i.t.startsWith(l));
            renderResults(filtered);
        }

        function search() {
            const q = document.getElementById('mainSearch').value.toLowerCase();
            const filtered = db.filter(i => i.t.toLowerCase().includes(q) || i.c.toLowerCase().includes(q) || i.d.toLowerCase().includes(q));
            renderResults(filtered);
        }

        function renderDreams() {
            const container = document.getElementById('dreamResults');
            container.innerHTML = Object.entries(dreams).map(([key, val]) => `
                <div class="bg-slate-800/50 p-4 rounded-2xl border border-slate-700">
                    <h4 class="text-indigo-300 font-black text-xs uppercase mb-1">${key}</h4>
                    <p class="text-[11px] text-slate-400 leading-snug">${val}</p>
                </div>
            `).join('');
        }

        function searchDreams() {
            const q = document.getElementById('dreamSearch').value.toLowerCase();
            const container = document.getElementById('dreamResults');
            const entries = Object.entries(dreams).filter(([key, val]) => key.toLowerCase().includes(q) || val.toLowerCase().includes(q));
            container.innerHTML = entries.map(([key, val]) => `
                <div class="bg-slate-800/50 p-4 rounded-2xl border border-slate-700">
                    <h4 class="text-indigo-300 font-black text-xs uppercase mb-1">${key}</h4>
                    <p class="text-[11px] text-slate-400 leading-snug">${val}</p>
                </div>
            `).join('');
        }

        function renderLegal() {
            document.getElementById('legalList').innerHTML = legals.map(l => `
                <div class="p-4 border-b border-slate-700 last:border-0">
                    <h5 class="text-white font-bold text-sm mb-1">${l.t}</h5>
                    <p class="text-xs text-slate-400">${l.d}</p>
                </div>
            `).join('');
        }

        function openTab(t, b) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active-tab'));
            document.getElementById(t).classList.add('active');
            b.classList.add('active-tab');
        }

        init();
    </script>
</body>
</html>
