<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PsychTools 2.0 | Erisma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .active-tab { border-bottom: 3px solid #4f46e5; color: #4f46e5; }
        .symbol-badge { cursor: pointer; transition: all 0.2s; }
        .symbol-badge:hover { background-color: #e0e7ff; transform: translateY(-2px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <header class="bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-20 shadow-sm">
        <div>
            <h1 class="text-xl font-black text-indigo-600 tracking-tight">PsychTools 2.0</h1>
            <p class="text-[10px] text-slate-400 font-bold uppercase">Erisma Medical Centre</p>
        </div>
        <div class="bg-indigo-50 px-3 py-1 rounded-full text-indigo-600 text-[10px] font-bold">PRO</div>
    </header>

    <nav class="flex bg-white border-b sticky top-[65px] z-10 shadow-sm">
        <button onclick="openTab('tests', this)" class="tab-btn flex-1 py-4 text-xs font-bold uppercase tracking-widest text-slate-400 active-tab">Тести</button>
        <button onclick="openTab('dreams', this)" class="tab-btn flex-1 py-4 text-xs font-bold uppercase tracking-widest text-slate-400">Сни</button>
        <button onclick="openTab('glossary', this)" class="tab-btn flex-1 py-4 text-xs font-bold uppercase tracking-widest text-slate-400">Глосарій</button>
    </nav>

    <main class="p-4 max-w-lg mx-auto pb-24">

        <div id="tests" class="tab-content active space-y-4">
            <div id="test-list" class="space-y-3">
                <div onclick="startTest('PHQ-9')" class="bg-white p-5 rounded-3xl border border-slate-200 shadow-sm hover:border-indigo-400 transition-all cursor-pointer">
                    <div class="flex justify-between items-center">
                        <div>
                            <span class="text-xs font-bold text-indigo-500 uppercase">Скринінг</span>
                            <h3 class="font-black text-lg">PHQ-9</h3>
                            <p class="text-xs text-slate-500 italic">Оцінка ступеня тяжкості депресії</p>
                        </div>
                        <i class="fa-solid fa-circle-play text-indigo-600 text-2xl"></i>
                    </div>
                </div>
            </div>

            <div id="test-window" class="hidden bg-white p-6 rounded-3xl border shadow-xl space-y-6">
                <div class="border-b pb-4 flex justify-between">
                    <h3 class="font-black text-indigo-600 uppercase">Тест: PHQ-9</h3>
                    <button onclick="cancelTest()" class="text-slate-300 hover:text-red-500"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div id="questions-container" class="space-y-8 h-[400px] overflow-y-auto pr-2"></div>
                <button onclick="finishTest()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-lg">Завершити та порахувати</button>
            </div>

            <div id="test-result" class="hidden bg-indigo-600 p-8 rounded-[40px] text-white space-y-4 shadow-2xl">
                <div class="text-center">
                    <p class="text-xs font-bold uppercase opacity-70">Результат скринінгу</p>
                    <h2 id="score-display" class="text-7xl font-black my-2">0</h2>
                    <p id="interpretation" class="text-lg font-bold leading-tight"></p>
                </div>
                <button id="copyResultBtn" class="w-full bg-white text-indigo-600 py-4 rounded-2xl font-black mt-4">Копіювати для AI-аналізу</button>
            </div>
        </div>

        <div id="dreams" class="tab-content space-y-6">
            <div class="bg-white p-5 rounded-3xl border border-slate-200 shadow-sm">
                <h3 class="font-black text-slate-800 mb-3">Словник архетипів</h3>
                <div class="flex flex-wrap gap-2" id="symbol-list">
                    </div>
                <div id="symbol-detail" class="mt-4 p-4 bg-indigo-50 rounded-2xl text-xs text-indigo-800 hidden italic"></div>
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Опис сну</label>
                <textarea id="dreamInput" class="w-full h-44 p-5 border-2 border-slate-100 rounded-[30px] outline-none focus:border-indigo-500 transition-all text-sm shadow-inner" placeholder="Які образи запам'яталися?"></textarea>
            </div>
            
            <button onclick="generateDreamPrompt()" class="w-full bg-slate-900 text-white py-5 rounded-[25px] font-black shadow-xl">Аналізувати через AI</button>
            
            <div id="dreamResult" class="hidden animate-pulse">
                <div id="dreamPromptText" class="p-4 bg-indigo-50 rounded-2xl text-[10px] text-indigo-900 border border-indigo-200"></div>
                <button onclick="copyText('dreamPromptText')" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold mt-2 shadow-lg">Копіювати промпт</button>
            </div>
        </div>

        <div id="glossary" class="tab-content space-y-4">
            <div class="relative">
                <input type="text" id="glossarySearch" onkeyup="filterGlossary()" placeholder="Шукати термін..." class="w-full p-4 pl-12 bg-white border rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 shadow-sm">
                <i class="fa-solid fa-search absolute left-5 top-5 text-slate-300"></i>
            </div>
            <div id="glossaryList" class="space-y-3"></div>
        </div>

    </main>

    <script>
        // БАЗА ДАНИХ СИМВОЛІВ
        const dreamSymbols = {
            "Вода": "Емоції, несвідоме. Чиста — спокій; каламутна — тривога; повінь — втрата контролю.",
            "Будинок": "Структура особистості. Кімнати — різні аспекти 'Я'. Підвал — глибоке несвідоме.",
            "Переслідування": "Втеча від внутрішнього конфлікту або тіньових сторін, які ви не хочете визнавати.",
            "Зуби": "Втрата контролю, страх старіння або безсилля у важливій ситуації.",
            "Політ": "Прагнення до свободи, відсторонення від земних проблем або духовне зростання.",
            "Ліс": "Невідомість, мандрівка у несвідоме. Загубитися — пошук себе.",
            "Вогонь": "Трансформація, сильна пристрасть або руйнівний гнів.",
            "Тварини": "Інстинкти. Дика тварина — некерована сила; домашня — приручені почуття."
        };

        const terms = [
            { t: "Несвідоме", c: "Психоаналіз", d: "Психічні процеси, що не усвідомлюються, але впливають на життя." },
            { t: "Тінь", c: "Юнгіанство", d: "Аспекти особистості, які людина в собі заперечує або не помічає." },
            { t: "Автоматичні думки", c: "КПТ", d: "Швидкі, оціночні думки, що виникають миттєво як реакція на подію." },
            { t: "Аніма / Анімус", c: "Юнгіанство", d: "Внутрішні образи жіночності в чоловіках та мужності в жінках." },
            { t: "Рефлексія", c: "Терапія", d: "Здатність усвідомлювати власні думки, емоції та стани." },
            { t: "Перенос", c: "Психоаналіз", d: "Коли пацієнт переносить почуття до значущих людей на терапевта." }
        ];

        const phq9Questions = [
            "Малий інтерес або задоволення від справ?",
            "Відчуття пригніченості, депресії або безнадії?",
            "Труднощі з засинанням, переривчастий сон або забагато сну?",
            "Відчуття втоми або брак енергії?",
            "Поганий апетит або переїдання?",
            "Погане ставлення до себе (відчуття невдахи тощо)?",
            "Труднощі з концентрацією (читання, ТБ)?",
            "Заторможеність або, навпаки, надмірна метушливість?",
            "Думки про те, що краще було б померти, або про заподіяння собі шкоди?"
        ];

        // ІНІЦІАЛІЗАЦІЯ
        function init() {
            // Заповнення символів
            const symbolList = document.getElementById('symbol-list');
            Object.keys(dreamSymbols).forEach(s => {
                symbolList.innerHTML += `<span onclick="showSymbol('${s}')" class="symbol-badge px-3 py-1 bg-white border border-slate-200 rounded-full text-[10px] font-bold text-slate-600 shadow-sm">${s}</span>`;
            });
            // Заповнення глосарію
            const glList = document.getElementById('glossaryList');
            glList.innerHTML = terms.map(item => `
                <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                    <span class="text-[8px] font-black text-indigo-500 uppercase tracking-tighter">${item.c}</span>
                    <h4 class="font-black text-slate-800">${item.t}</h4>
                    <p class="text-xs text-slate-500 mt-1">${item.d}</p>
                </div>
            `).join('');
        }

        function showSymbol(s) {
            const detail = document.getElementById('symbol-detail');
            detail.innerText = dreamSymbols[s];
            detail.classList.remove('hidden');
        }

        function startTest(type) {
            document.getElementById('test-list').classList.add('hidden');
            document.getElementById('test-window').classList.remove('hidden');
            const container = document.getElementById('questions-container');
            container.innerHTML = phq9Questions.map((q, i) => `
                <div class="space-y-4">
                    <p class="text-sm font-bold text-slate-800 leading-tight">${i+1}. ${q}</p>
                    <div class="grid grid-cols-4 gap-2">
                        ${['Ніколи', 'Кілька днів', 'Півмісяця', 'Майже щодня'].map((v, idx) => `
                            <button onclick="setScore(${i}, ${idx}, this)" class="q-btn-${i} py-2 text-[8px] font-black uppercase border rounded-xl bg-slate-50 text-slate-400">${v}</button>
                        `).join('')}
                    </div>
                </div>
            `).join('');
            window.currentScores = new Array(phq9Questions.length).fill(null);
        }

        window.setScore = function(qI, val, btn) {
            window.currentScores[qI] = val;
            document.querySelectorAll(`.q-btn-${qI}`).forEach(b => {
                b.classList.remove('bg-indigo-600', 'text-white', 'border-indigo-600');
                b.classList.add('bg-slate-50', 'text-slate-400');
            });
            btn.classList.add('bg-indigo-600', 'text-white', 'border-indigo-600');
            btn.classList.remove('bg-slate-50', 'text-slate-400');
        }

        function finishTest() {
            if (window.currentScores.includes(null)) return alert('Дайте відповідь на всі 9 питань!');
            const total = window.currentScores.reduce((a, b) => a + b, 0);
            document.getElementById('test-window').classList.add('hidden');
            document.getElementById('test-result').classList.remove('hidden');
            document.getElementById('score-display').innerText = total;
            
            let interpretation = "";
            if(total <= 4) interpretation = "Мінімальна депресія. Норма.";
            else if(total <= 9) interpretation = "Легка депресія. Можливе спостереження.";
            else if(total <= 14) interpretation = "Помірна депресія. Рекомендована терапія.";
            else if(total <= 19) interpretation = "Помірно тяжка депресія. Потрібна допомога.";
            else interpretation = "Тяжка депресія. Необхідне термінове втручання.";
            
            document.getElementById('interpretation').innerText = interpretation;

            document.getElementById('copyResultBtn').onclick = () => {
                const p = `Дій як клінічний психолог. Пацієнт пройшов тест PHQ-9 і набрав ${total} балів (${interpretation}). Зроби розбір стану та підготуй план першої сесії.`;
                navigator.clipboard.writeText(p);
                alert('Скопійовано! Встав це в чат з AI.');
            };
        }

        function generateDreamPrompt() {
            const txt = document.getElementById('dreamInput').value;
            if(!txt) return alert('Опишіть хоча б один символ!');
            const p = `Дій як юнгіанський аналітик. Сон: "${txt}". Проаналізуй символи, виділи архетипи та сформулюй 3 питання для клієнта, щоб розкрити зміст сну.`;
            document.getElementById('dreamPromptText').innerText = p;
            document.getElementById('dreamResult').classList.remove('hidden');
        }

        function openTab(t, b) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active-tab'));
            document.getElementById(t).classList.add('active');
            b.classList.add('active-tab');
        }

        function cancelTest() {
            document.getElementById('test-window').classList.add('hidden');
            document.getElementById('test-list').classList.remove('hidden');
        }

        function copyText(id) {
            navigator.clipboard.writeText(document.getElementById(id).innerText);
            alert('Скопійовано!');
        }

        init();
    </script>
</body>
</html>
